name: Release Drafter

on:
  push:
    # branches to consider in the event; optional, defaults to all
    branches:
      - main

  # pull_request event is required only for autolabeler
  pull_request:
    # Only following types are handled by the action, but one can default to all as well
    types: [opened, reopened, synchronize]
  # pull_request_target event is required for autolabeler to support PRs from forks
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

env:
  RELEASE_DRAFTER_CONFIG_NAME: release-drafter.yml
  RELEASE_DRAFTER_CONFIG_PATH: .github/release-drafter.yml

jobs:
  update_release_draft:
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # (Optional) GitHub Enterprise requires GHE_HOST variable set
      #- name: Set GHE_HOST
      #  run: |
      #    echo "GHE_HOST=${GITHUB_SERVER_URL##https:\/\/}" >> $GITHUB_ENV

      - name: Check if Release Drafter config exists on the default branch
        if: github.event_name != 'push'
        id: config_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_DRAFTER_CONFIG_PATH: ${{ env.RELEASE_DRAFTER_CONFIG_PATH }}
        run: |
          response_file="$(mktemp)"

          status_code="$(curl --silent --output "$response_file" --write-out '%{http_code}' --config - <<EOF
          header = "Authorization: Bearer $GITHUB_TOKEN"
          header = "Accept: application/vnd.github+json"
          url = "https://api.github.com/repos/$REPOSITORY/contents/$RELEASE_DRAFTER_CONFIG_PATH?ref=$DEFAULT_BRANCH"
          EOF
          )"

          if [ "$status_code" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif [ "$status_code" = "404" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "Error: Unexpected API response (HTTP $status_code) when checking for Release Drafter config:"
            cat "$response_file"
            exit 1
          fi

          rm -f "$response_file"

      - name: Skip bootstrap PR runs until the config is available on the default branch
        if: github.event_name != 'push' && steps.config_check.outputs.exists != 'true'
        run: echo "Skipping Release Drafter because ${{ env.RELEASE_DRAFTER_CONFIG_PATH }} is not yet available on the default branch."

      # Drafts your next Release notes as Pull Requests are merged into "main"
      - uses: release-drafter/release-drafter@v6
        if: github.event_name == 'push' || steps.config_check.outputs.exists == 'true'
        # (Optional) specify config name to use, relative to .github/. Default: release-drafter.yml
        with:
          config-name: ${{ env.RELEASE_DRAFTER_CONFIG_NAME }}
        #   disable-autolabeler: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
